# ==============================================
# PRODUCTION Docker Compose for LXC Server
# ==============================================
# Salin fail ini ke server sebagai docker-compose.yml
# Buat fail .env di sebelah fail ini dengan semua config

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: saashouse
      POSTGRES_DB: saashouse
      # POSTGRES_PASSWORD dibaca dari .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    image: ghcr.io/muhammadkmal27/saashouse/backend:main
    restart: always
    depends_on:
      - postgres
      - redis
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "8080:8080"

  frontend:
    image: ghcr.io/muhammadkmal27/saashouse/frontend:main
    restart: always
    depends_on:
      - backend
    environment:
      BACKEND_URL: "http://backend:8080"
    ports:
      - "3000:3000"

  pgadmin:
    image: dpage/pgadmin4
    container_name: saas_pgadmin4
    environment:
      # Emel dan password untuk LOGIN ke dashboard pgAdmin di production
      PGADMIN_DEFAULT_EMAIL: admin@saashouse.com
      PGADMIN_DEFAULT_PASSWORD: rootpassword
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: "10"
    ports:
      - "8081:80"
    depends_on:
      - postgres
    restart: always

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    # Port 6379 tidak dibuka ke luar (public) untuk keselamatan prod
    # Hanya backend boleh akses melalui internal network

volumes:
  pgdata:
  redis_data:
