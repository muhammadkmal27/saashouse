# ==============================================
# PRODUCTION Docker Compose for LXC Server
# ==============================================
# Salin fail ini ke server sebagai docker-compose.yml
# Buat fail .env di sebelah fail ini dengan semua config

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: saashouse
      POSTGRES_DB: saashouse
      # POSTGRES_PASSWORD dibaca dari .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    image: ghcr.io/muhammadkmal27/saashouse/backend:main
    restart: always
    depends_on:
      - postgres
    env_file: .env
    ports:
      - "8080:8080"

  frontend:
    image: ghcr.io/muhammadkmal27/saashouse/frontend:main
    restart: always
    depends_on:
      - backend
    environment:
      BACKEND_URL: "http://backend:8080"
    ports:
      - "3000:3000"

volumes:
  pgdata:
